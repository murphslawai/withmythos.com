<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythos</title>
    <meta name="description" content="Every civilization that survived left behind stories. We're building machines that tell them for free.">
    <meta property="og:title" content="Mythos">
    <meta property="og:description" content="The tools are infinite now. Yet what we must scale is us.">
    <meta property="og:url" content="https://withmythos.com">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Mythos">
    <meta name="twitter:description" content="The tools are infinite now. Yet what we must scale is us.">
    <link rel="canonical" href="https://withmythos.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream: #F2EFE8;
            --cream-light: #FAF8F5;
            --cream-dark: #E8E4D8;
            --ink: #2C2A28;
            --ink-light: #5B5854;
            --ink-dark: #1A1817;
        }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection { background: var(--ink); color: var(--cream); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--cream); }
        ::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 10px; }

        /* Overlays */
        .noise {
            position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23n)"/%3E%3C/svg%3E');
        }
        .vignette {
            position: fixed; inset: 0; pointer-events: none; z-index: 40;
            background: radial-gradient(circle at center, transparent 40%, rgba(44,42,40,0.04) 100%);
        }

        /* Typography */
        h2 {
            font-size: clamp(2rem, 4.5vw, 4.5rem);
            font-weight: 300;
            line-height: 1.15;
            letter-spacing: -0.01em;
        }
        .line {
            display: block;
            min-height: 1.2em;
        }
        .line-sub {
            display: block;
            font-style: italic;
            font-weight: 300;
            color: var(--ink-light);
            margin-top: 0.15em;
            min-height: 1.2em;
        }
        .align-left .line-sub { margin-left: 2rem; }
        .align-right .line-sub { margin-right: 2rem; }
        @media (min-width: 768px) {
            .align-left .line-sub { margin-left: 4rem; }
            .align-right .line-sub { margin-right: 4rem; }
        }

        /* Cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.9em;
            background: var(--ink);
            margin-left: 2px;
            vertical-align: baseline;
            animation: blink 0.8s step-end infinite;
        }
        .line-sub .cursor { background: var(--ink-light); }
        .cursor.done {
            animation: fadeOut 0.6s ease forwards;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        @keyframes fadeOut {
            to { opacity: 0; }
        }

        /* Sections */
        section {
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 2rem;
        }
        @media (min-width: 768px) { section { padding: 0 6rem; } }
        @media (min-width: 1024px) { section { padding: 0 10rem; } }

        .align-left { justify-content: flex-start; }
        .align-right { justify-content: flex-end; text-align: right; }
        .align-center { justify-content: center; text-align: center; }

        .tall { min-height: 100vh; }
        .medium { min-height: 85vh; }
        .short { min-height: 65vh; }
        .breath { min-height: 55vh; }

        /* Sections hidden until typed */
        .type-section h2 {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .type-section.active h2,
        .type-section.typed h2 {
            opacity: 1;
        }

        /* Logo */
        .logo svg { width: 100%; height: auto; display: block; }
        .logo path { fill: var(--ink); }

        .logo-watermark {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0.03;
            transition: opacity 3s ease 1.5s;
        }
        .logo-watermark.fade { opacity: 0; }
        .logo-watermark svg { width: 65vw; max-width: 1000px; }

        .logo-breather { display: flex; flex-direction: column; align-items: center; }
        .logo-breather svg { width: clamp(100px, 18vw, 240px); }

        .logo-finale svg { width: clamp(200px, 45vw, 600px); }

        /* Finale */
        .finale-logo {
            opacity: 0;
            transform: scale(0.96);
            transition: opacity 3s cubic-bezier(0.2, 0.8, 0.2, 1),
                        transform 3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .finale-logo.visible { opacity: 1; transform: scale(1); }

        .finale-text {
            font-style: italic;
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            font-weight: 300;
            color: var(--ink-light);
            margin-top: 3rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease 0.8s, transform 2s ease 0.8s;
        }
        .finale-text.visible { opacity: 1; transform: translateY(0); }

        .finale-form {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease 1.6s, transform 1.5s ease 1.6s;
        }
        .finale-form.visible { opacity: 1; transform: translateY(0); }

        .finale-footer {
            opacity: 0;
            transition: opacity 1.5s ease 2.4s;
        }
        .finale-footer.visible { opacity: 1; }

        /* Opening */
        .opening {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        /* Email form */
        .email-wrap { width: 100%; max-width: 26rem; margin-top: 2.5rem; }
        .email-form {
            display: flex; flex-direction: column; gap: 1rem;
            align-items: center;
        }
        @media (min-width: 640px) {
            .email-form { flex-direction: row; align-items: flex-end; }
        }
        .email-input {
            flex: 1; width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(44,42,40,0.25);
            padding: 0.6rem 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: var(--ink);
            outline: none;
            transition: border-color 0.4s ease;
        }
        .email-input:focus { border-bottom-color: var(--ink); }
        .email-input::placeholder { color: rgba(44,42,40,0.35); font-style: italic; }
        .finale-thanks {
            font-style: italic;
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-weight: 300;
            color: var(--ink-light);
            margin-top: 1.5rem;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .finale-thanks.show { opacity: 1; }
        .email-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            background: var(--ink);
            color: var(--cream);
            border: none;
            padding: 0.8rem 2rem;
            cursor: pointer;
            transition: background 0.5s ease;
            white-space: nowrap;
        }
        .email-btn:hover { background: var(--ink-light); }

        /* Footer */
        .footer-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: rgba(44,42,40,0.25);
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="vignette"></div>

    <main>

        <!-- 1. Opening -->
        <section class="opening type-section" data-auto="true">
            <div class="logo-watermark logo">

            </div>
            <div style="z-index:10;">
                <h2>
                    <span class="line" data-text="Every civilization that survived left behind stories."></span>
                    <span class="line-sub" data-text="Not manuals. Not systems. Myths."></span>
                </h2>
            </div>
        </section>

        <!-- 2 -->
        <section class="align-right medium type-section">
            <div>
                <h2>
                    <span class="line" data-text="They spoke of fire and monsters."></span>
                    <span class="line-sub" data-text="Knights and heroes."></span>
                </h2>
            </div>
        </section>

        <!-- 3 -->
        <section class="align-left tall type-section">
            <div>
                <h2>
                    <span class="line" data-text="We're building machines that tell them for free."></span>
                    <span class="line-sub" data-text="And calling it progress..."></span>
                </h2>
            </div>
        </section>

        <!-- 4 -->
        <section class="align-right medium type-section">
            <div>
                <h2>
                    <span class="line" data-text="We're optimizing the campfire."></span>
                    <span class="line-sub" data-text="Automating the elder."></span>
                </h2>
            </div>
        </section>

        <!-- 5 -->
        <section class="align-center medium type-section">
            <div>
                <h2>
                    <span class="line" data-text="Scaling the story..."></span>
                    <span class="line-sub" data-text="as if there will be anyone left in it."></span>
                </h2>
            </div>
        </section>

        <!-- 6 -->
        <section class="align-left medium type-section">
            <div>
                <h2>
                    <span class="line" data-text="The content ships."></span>
                    <span class="line-sub" data-text="The byline is invisible."></span>
                </h2>
            </div>
        </section>

        <!-- 7 -->
        <section class="align-right medium type-section">
            <div>
                <h2>
                    <span class="line" data-text="The newsletters go out."></span>
                    <span class="line-sub" data-text="The voice behind them is silent."></span>
                </h2>
            </div>
        </section>

        <!-- 8 -->
        <section class="align-center tall type-section">
            <div>
                <h2>
                    <span class="line" data-text="We call it saving time..."></span>
                    <span class="line-sub" data-text="as if time isn't all we are spending."></span>
                </h2>
            </div>
        </section>

        <!-- 9 -->
        <section class="align-left tall type-section">
            <div>
                <h2>
                    <span class="line" data-text="But the myths haven't died."></span>
                    <span class="line-sub" data-text="We've just stopped trying to keep them alive."></span>
                </h2>
            </div>
        </section>

        <!-- 10 -->
        <section class="align-right medium type-section">
            <div>
                <h2>
                    <span class="line" data-text="A machine can write your story."></span>
                    <span class="line-sub" data-text="It will never know why it mattered."></span>
                </h2>
            </div>
        </section>

        <!-- 11 -->
        <section class="align-center tall type-section">
            <div>
                <h2>
                    <span class="line" data-text="The tools are infinite now."></span>
                    <span class="line-sub" data-text="Yet what we must scale is... us."></span>
                </h2>
            </div>
        </section>

        <!-- 12 -->
        <section class="align-left medium type-section">
            <div>
                <h2>
                    <span class="line" data-text="The storytellers are still here."></span>
                    <span class="line-sub" data-text="Buried under everything that sounds like them."></span>
                </h2>
            </div>
        </section>

        <!-- 13 -->
        <section class="align-right medium type-section">
            <div>
                <h2>
                    <span class="line" data-text="The feed is loud."></span>
                    <span class="line-sub" data-text="The things worth saying are quiet."></span>
                </h2>
            </div>
        </section>

        <!-- 14 -->
        <section class="align-center short type-section" data-stagger="true">
            <div>
                <h2 style="color:var(--ink-light);">
                    <span class="line" data-text="They always were." data-speed="90" style="font-style:italic;"></span>
                    <span class="line-sub" data-text="They always are."></span>
                    <span class="line" data-text="They always will be." data-speed="90" style="margin-top:0.4em; color:var(--ink);"></span>
                </h2>
            </div>
        </section>

        <!-- 15 -->
        <section class="align-center tall type-section" data-line-gap="250">
            <div>
                <h2>
                    <span class="line" data-text="Somewhere between the fire and the machine,"></span>
                    <span class="line-sub" data-text="there is a door that hasn't been opened yet."></span>
                </h2>
            </div>
        </section>

        <!-- 16 -->
        <section class="align-center medium type-section">
            <div>
                <h2>
                    <span class="line" data-text="Not backward. Not forward."></span>
                    <span class="line-sub" data-text="Through." data-speed="120"></span>
                </h2>
            </div>
        </section>

        <!-- FINALE -->
        <section class="align-center" style="min-height:120vh; flex-direction:column; padding-bottom:6rem;">

    <script>
        // Typewriter engine — pauses are driven by punctuation and rhythm, not manual indices.
        // After a period: 350ms breath. After ellipsis dots: 280ms each. After comma: 150ms.
        // "Through." gets its own slower speed via data-speed attribute.
        function typeText(el, text, speed, callback) {
            let i = 0;
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            el.appendChild(cursor);

            function type() {
                if (i < text.length) {
                    const char = text[i];
                    el.insertBefore(document.createTextNode(char), cursor);
                    i++;

                    // Natural pause logic based on what we just typed
                    let pause = 0;
                    if (char === '.' && text[i] === '.' && text[i - 2] !== '.') {
                        // First dot of ellipsis
                        pause = 280;
                    } else if (char === '.' && text[i - 2] === '.') {
                        // Last dot of ellipsis — longer, the thought trailing off
                        pause = 450;
                    } else if (char === '.' && text[i - 2] !== '.') {
                        // Period (end of sentence within a line)
                        pause = 350;
                    } else if (char === ',') {
                        pause = 150;
                    }

                    // Gentle jitter (±8ms, subtle)
                    const jitter = speed + (Math.random() * 16 - 8);
                    setTimeout(type, Math.max(30, jitter) + pause);
                } else {
                    cursor.classList.add('done');
                    setTimeout(() => {
                        if (cursor.parentNode) cursor.remove();
                        if (callback) callback();
                    }, 600);
                }
            }
            type();
        }

        function typeSection(section) {
            if (section.classList.contains('active') || section.classList.contains('typed')) return;
            section.classList.add('active');

            const lines = section.querySelectorAll('[data-text]');
            const isStagger = section.dataset.stagger === 'true';
            let lineIndex = 0;

            function typeLine() {
                if (lineIndex >= lines.length) {
                    section.classList.add('typed');
                    return;
                }
                const line = lines[lineIndex];
                const text = line.dataset.text;
                const isSub = line.classList.contains('line-sub');
                // Per-line override via data-speed, otherwise defaults
                const speed = line.dataset.speed ? parseInt(line.dataset.speed) : (isSub ? 55 : 70);
                // Per-section line gap override, otherwise defaults
                const customGap = section.dataset.lineGap ? parseInt(section.dataset.lineGap) : null;
                const delay = isStagger && lineIndex > 0 ? 1200
                    : lineIndex > 0 && customGap !== null ? customGap
                    : (isSub ? 600 : 0);

                setTimeout(() => {
                    typeText(line, text, speed, () => {
                        lineIndex++;
                        typeLine();
                    });
                }, delay);
            }

            typeLine();
        }

        // Intersection observer for scroll-triggered typing
        const typeObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    typeSection(entry.target);
                }
            });
        }, { threshold: 0.5 });

        // Observe all type sections (except auto-start)
        document.querySelectorAll('.type-section').forEach(section => {
            if (section.dataset.auto !== 'true') {
                typeObserver.observe(section);
            }
        });

        // Auto-start the opening section after brief pause
        setTimeout(() => {
            const opening = document.querySelector('[data-auto="true"]');
            if (opening) {
                typeSection(opening);
                // Fade the watermark as typing begins
                const watermark = document.querySelector('.logo-watermark');
                if (watermark) watermark.classList.add('fade');
            }
        }, 800);

        // Breather + finale observer
        const fadeObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('.finale-logo, .finale-text, .finale-form, .finale-footer').forEach(el => {
            fadeObserver.observe(el);
        });

        // Form submission → Vercel serverless function
        document.getElementById('mythos-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('mythos-email').value;
            const btn = e.target.querySelector('.email-btn');
            btn.textContent = '...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if (!res.ok) throw new Error('Failed');
            } catch (err) {
                // Still show thanks — we'll catch it in logs
                console.error('Subscribe error:', err);
            }

            e.target.style.display = 'none';
            const thanks = document.getElementById('mythos-thanks');
            thanks.style.display = 'block';
            requestAnimationFrame(() => thanks.classList.add('show'));
        });
    </script>
